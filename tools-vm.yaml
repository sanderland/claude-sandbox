# Lima VM configuration for development tools
# Usage: limactl create --name=my-tools-vm tools-vm.yaml
# Then use with: ./claude-sandbox --clone-from my-tools-vm

# Ubuntu 24.04 LTS - stable, well-supported
images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# VM Resources
cpus: 11
memory: "40GiB"
disk: "100GiB"

# Use VZ (Apple Virtualization.framework) for faster startup than QEMU
vmType: "vz"

# Disable audio and video for headless operation (faster startup)
audio:
  device: null
video:
  display: "none"

# Mounts configured dynamically by claude-sandbox script at clone time
mounts: []

# Use virtiofs for fast, writable mounts
mountType: "virtiofs"

# VZ virtualization options (macOS only)
vmOpts:
  vz:
    # Rosetta for x86_64 emulation on Apple Silicon
    rosetta:
      enabled: true
      binfmt: true

# Cloud-init provisioning
# Each tool has its own stamp file so provisioning can resume after failures.
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux

      STAMP_DIR="/var/lib/claude-sandbox"
      mkdir -p "$STAMP_DIR"

      done_or_mark() {
        local name="$1"
        if [ -f "$STAMP_DIR/$name" ]; then
          echo "==> Skipping $name (already installed)"
          return 1
        fi
        return 0
      }
      stamp() { touch "$STAMP_DIR/$1"; }

      # --- Base packages ---
      if done_or_mark "base-packages"; then
        apt-get update
        apt-get upgrade -y
        apt-get install -y \
          git curl wget jq ripgrep fd-find bat \
          build-essential pkg-config libssl-dev \
          ca-certificates gnupg software-properties-common \
          unzip zip htop tree tmux \
          clang llvm cmake
        stamp "base-packages"
      fi

      # --- Python (system + 3.13 from deadsnakes) ---
      if done_or_mark "python"; then
        apt-get install -y python3 python3-pip python3-venv python3-dev
        add-apt-repository -y ppa:deadsnakes/ppa
        apt-get update
        apt-get install -y python3.13 python3.13-dev python3.13-venv
        stamp "python"
      fi

      # --- Go ---
      if done_or_mark "go"; then
        GO_VERSION="1.24.1"
        ARCH=$(dpkg --print-architecture)
        wget -q "https://go.dev/dl/go${GO_VERSION}.linux-${ARCH}.tar.gz" -O /tmp/go.tar.gz
        rm -rf /usr/local/go
        tar -C /usr/local -xzf /tmp/go.tar.gz
        rm /tmp/go.tar.gz

        cat > /etc/profile.d/go.sh << 'GOEOF'
      export PATH=$PATH:/usr/local/go/bin
      export GOPATH=$HOME/go
      export PATH=$PATH:$GOPATH/bin
      GOEOF
        stamp "go"
      fi

      # --- LaTeX (full TeX Live installation) ---
      if done_or_mark "latex"; then
        apt-get install -y texlive-full
        stamp "latex"
      fi

      # --- Docker Engine ---
      if done_or_mark "docker"; then
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
        apt-get update
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
        usermod -aG docker "{{.User}}"
        stamp "docker"
      fi

  - mode: user
    script: |
      #!/bin/bash
      set -eu

      STAMP_DIR="$HOME/.claude-sandbox-stamps"
      mkdir -p "$STAMP_DIR"

      done_or_mark() {
        local name="$1"
        if [ -f "$STAMP_DIR/$name" ]; then
          echo "==> Skipping $name (already installed)"
          return 1
        fi
        return 0
      }
      stamp() { touch "$STAMP_DIR/$1"; }

      # --- Rust ---
      if done_or_mark "rust"; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        . "$HOME/.cargo/env"
        rustup component add rust-analyzer
        stamp "rust"
      fi
      [ -f "$HOME/.cargo/env" ] && . "$HOME/.cargo/env"

      # --- Go tools ---
      if done_or_mark "go-tools"; then
        export PATH=$PATH:/usr/local/go/bin
        export GOPATH=$HOME/go
        export PATH=$PATH:$GOPATH/bin
        go install golang.org/x/tools/gopls@latest
        stamp "go-tools"
      fi

      # --- uv (Python package manager) ---
      if done_or_mark "uv"; then
        curl -LsSf https://astral.sh/uv/install.sh | sh
        stamp "uv"
      fi

      # --- Node.js via fnm ---
      if done_or_mark "node"; then
        curl -fsSL https://fnm.vercel.app/install | bash -s -- --install-dir "$HOME/.local/share/fnm" --skip-shell
        export PATH="$HOME/.local/share/fnm:$PATH"
        set +u
        eval "$("$HOME/.local/share/fnm/fnm" env --shell bash)"
        set -u
        "$HOME/.local/share/fnm/fnm" install --lts
        "$HOME/.local/share/fnm/fnm" default lts-latest
        set +u
        eval "$("$HOME/.local/share/fnm/fnm" env --shell bash)"
        set -u
        npm install -g typescript ts-node
        stamp "node"
      fi

      # --- Claude Code ---
      if done_or_mark "claude"; then
        curl -fsSL https://claude.ai/install.sh | bash
        stamp "claude"
      fi

      # --- Docker CLI config ---
      if done_or_mark "docker-config"; then
        mkdir -p "$HOME/.docker"
        cat > "$HOME/.docker/config.json" << 'DOCKER_EOF'
      {
        "cliPluginsExtraDirs": ["/usr/libexec/docker/cli-plugins"]
      }
      DOCKER_EOF
        stamp "docker-config"
      fi

      # --- Common Python packages (system-level) ---
      if done_or_mark "python-packages"; then
        export PATH="$HOME/.local/bin:$PATH"
        uv pip install --system numpy scipy pandas matplotlib
        stamp "python-packages"
      fi

      # --- Shell profile ---
      if done_or_mark "profile"; then
        cat >> "$HOME/.profile" << 'PROFILE_EOF'

      # uv / local bin
      export PATH="$HOME/.local/bin:$PATH"

      # fnm (Node.js)
      export PATH="$HOME/.local/share/fnm:$PATH"
      eval "$(fnm env)"

      # Cargo/Rust
      . "$HOME/.cargo/env"

      # Shadow any macOS .venv that may be mounted from the host.
      # A darwin venv has broken symlinks to /opt/homebrew/... and will confuse
      # tools into thinking there's a usable environment. This function warns
      # and guides toward creating a fresh Linux venv.
      _check_venv() {
        if [ -n "${VIRTUAL_ENV:-}" ]; then return; fi
        local d="${PWD-.}"
        if [ -d "$d/.venv" ] && [ -L "$d/.venv/bin/python" ] && ! [ -e "$d/.venv/bin/python" ]; then
          echo "[claude-sandbox] WARNING: .venv/ has broken symlinks (likely a macOS venv)."
          echo "  Create a Linux venv:  uv venv .venv-linux && source .venv-linux/bin/activate"
        fi
      }
      PROMPT_COMMAND="${PROMPT_COMMAND:+$PROMPT_COMMAND;}_check_venv"
      PROFILE_EOF
        stamp "profile"
      fi
